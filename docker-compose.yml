version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrovision-backend
    ports:
      - "8000:8000"
    environment:
      - HF_API_KEY=${HF_API_KEY}
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./backend/model:/app/model:ro
      - ./backend/routes:/app/routes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - agrovision-network

  # Frontend React App Service
  frontend:
    build:
      context: ./onion-frontend
      dockerfile: Dockerfile
    container_name: agrovision-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
      - REACT_APP_ENVIRONMENT=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agrovision-network

networks:
  agrovision-network:
    driver: bridge

# To run:
# docker-compose up -d
#
# To view logs:
# docker-compose logs -f
#
# To stop:
# docker-compose down
#
# To rebuild:
# docker-compose up -d --build
